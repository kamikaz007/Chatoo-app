<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chatoo Pro | Cinematic Experience</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script src="rpc.js"></script>

    <style>
        :root { --primary: #8257e5; --gold: #ffd700; --dark: #09090b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: #fff; font-family: sans-serif; overflow: hidden; }

        /* شاشة القفل السينمائية */
        #lock-screen {
            position: fixed; inset: 0; z-index: 9999; 
            background: radial-gradient(circle at center, #1a1a2e 0%, #09090b 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .card { 
            background: rgba(255,255,255,0.05); padding: 40px; border-radius: 32px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); 
            width: 90%; max-width: 380px; 
        }
        
        .entry-btn { 
            background: var(--primary); color: white; border: none; padding: 18px; 
            border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; 
            margin-top: 20px; display: none; box-shadow: 0 4px 15px rgba(130, 87, 229, 0.4);
        }

        /* واجهة التطبيق الرئيسية */
        .app-shell { display: none; flex-direction: column; height: 100vh; position: relative; }
        #map-canvas { flex-grow: 1; z-index: 10; width: 100%; height: 100%; filter: grayscale(0.5) brightness(0.6); }

        header { 
            position: absolute; top: 0; width: 100%; padding: 25px 20px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
            display: flex; justify-content: space-between; align-items: center; z-index: 1000; 
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        /* مودال الدردشة */
        .view-modal { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: none; flex-direction: column; }
        .view-modal.active { display: flex; }
        .chat-header { background: var(--primary); padding: 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .chat-stream { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 14px; background: #1a1a1d; border: 1px solid rgba(255,255,255,0.05); }
        .msg.me { align-self: flex-end; background: var(--primary); border: none; }

        nav { background: #050505; display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="card">
            <h1 style="letter-spacing: 4px; margin-bottom: 5px;">CHATOO <span style="color:var(--primary)">PRO</span></h1>
            <p id="user-status" style="color: #888; font-size: 14px;">جاري الاتصال بشبكة Pi...</p>
            <button id="entry-btn" class="entry-btn" onclick="App.unlock()">دخول التطبيق</button>
        </div>
    </div>

    <div class="app-shell" id="main-app">
        <header>
            <div style="color:var(--gold); font-weight:bold; font-size: 18px;">0.00 ✨</div>
            <div style="font-weight:900; letter-spacing:4px; font-size: 20px;">CHATOO</div>
            <div class="status-dot"></div>
        </header>

        <div id="map-canvas"></div>
<nav>
    <div class="nav-item" onclick="App.showProfile()">👤</div>
    <div class="nav-item" onclick="App.showGifts()">🎁</div>
    <div class="nav-item active" onclick="App.showMap()">📍</div>
</nav>

    </div>

    <div id="modal-chat" class="view-modal">
        <div class="chat-header">
            <div onclick="App.closeChat()" style="font-size:25px; cursor:pointer; padding: 5px;">✕</div>
            <span id="venue-name">المكان</span>
            <div style="width:25px;"></div>
        </div>
        <div class="chat-stream" id="chat-flow"></div>
        <div style="padding:20px; background:#0c0c0e; display:flex; gap:10px; border-top: 1px solid rgba(255,255,255,0.05);">
            <input type="text" id="chat-input" placeholder="اكتب رسالة..." 
                style="flex-grow:1; background:#16161a; border:1px solid #222; padding:15px; border-radius:25px; color:#fff; outline:none;">
            <button onclick="App.send()" 
                style="background:var(--gold); border:none; width:50px; height:50px; border-radius:50%; cursor:pointer; font-weight:bold;">➔</button>
        </div>
    </div>

    <script>
        // تشغيل نظام المصادقة عند تحميل الصفحة
        window.onload = () => Auth.init();
    </script>
</body>
</html>
