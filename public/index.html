<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chatoo Pro | Web3 Experience</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="config.js"></script>
    <script src="rpc.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>

    <style>
        :root { --primary: #8257e5; --gold: #ffd700; --dark: #09090b; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #lock-screen { position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at center, #1a1a2e 0%, #09090b 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); width: 85%; max-width: 350px; text-align: center; }
        
        .entry-btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(130, 87, 229, 0.3); transition: 0.3s; }
        .entry-btn:disabled { background: #444; cursor: not-allowed; }

        .app-shell { display: none; flex-direction: column; height: 100vh; }
        #map-canvas { flex-grow: 1; filter: grayscale(0.4) brightness(0.7); }

        header { position: absolute; top: 0; width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff4444; transition: 0.5s; }

        .view-modal { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: none; flex-direction: column; }
        .view-modal.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        nav { background: #050505; display: flex; justify-content: space-around; padding: 15px 0 30px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        .nav-item { font-size: 24px; opacity: 0.4; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="card">
            <h2 style="letter-spacing: 3px;">CHATOO <span style="color:var(--primary)">PRO</span></h2>
            <p id="user-status" style="font-size: 13px; color: #aaa;">جاري فحص اتصال البلوكشين...</p>
            <button id="entry-btn" class="entry-btn" onclick="handleSecureEntry()" disabled>دخول آمن</button>
        </div>
    </div>

    <div class="app-shell" id="main-app">
        <header>
            <div id="balance-display" style="color:var(--gold); font-weight:bold;">0.00 Pi</div>
            <div class="status-dot"></div>
        </header>
        <div id="map-canvas"></div>
        <nav>
            <div class="nav-item" onclick="App.showProfile()">👤</div>
            <div class="nav-item" onclick="App.showGifts()">🎁</div>
            <div class="nav-item active" onclick="App.showMap()">📍</div>
        </nav>
    </div>

    <div id="modal-chat" class="view-modal">
        <div style="background:var(--primary); padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <span onclick="App.closeChat()" style="font-size:25px;">✕</span>
            <span id="venue-name" style="font-weight:bold;">المكان</span>
            <div style="width:25px;"></div>
        </div>
        <div id="chat-flow" style="flex-grow:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="padding:15px; display:flex; gap:10px; background:#111;">
            <input type="text" id="chat-input" placeholder="اكتب رسالتك الحقيقية..." style="flex-grow:1; background:#222; border:none; padding:15px; border-radius:15px; color:#fff;">
            <button onclick="App.send()" style="background:var(--gold); border:none; width:50px; border-radius:15px; font-weight:bold;">➔</button>
        </div>
    </div>

    <script>
        async function handleSecureEntry() {
            const isReady = await RPC.checkHealth();
            if(isReady) App.unlock();
            else alert("فشل الاتصال بـ RPC. تأكد من جودة الإنترنت.");
        }
        window.onload = () => Auth.init();
    </script>
</body>
</html>
