<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chatoo Pro | Final Fix</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="rpc.js"></script>

    <style>
        :root { --primary: #8257e5; --gold: #ffd700; --dark: #09090b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: #fff; font-family: sans-serif; overflow: hidden; }

        /* شاشة القفل */
        #lock-screen {
            position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at center, #1a1a2e 0%, #09090b 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); width: 90%; max-width: 380px; }
        
        .entry-btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; display: none; }

        /* التطبيق الرئيسي */
        .app-shell { display: none; flex-direction: column; height: 100vh; position: relative; }
        #map-canvas { flex-grow: 1; z-index: 10; width: 100%; height: 100%; filter: grayscale(0.5) brightness(0.6); }

        header { position: absolute; top: 0; width: 100%; padding: 25px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        /* الدردشة */
        .view-modal { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: none; flex-direction: column; }
        .view-modal.active { display: flex; }
        .chat-header { background: var(--primary); padding: 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .chat-stream { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 14px; background: #222; }
        .msg.me { align-self: flex-end; background: var(--primary); }

        nav { background: #050505; display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.5; }
        .nav-item.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="card">
            <h1 style="letter-spacing: 4px;">CHATOO <span style="color:var(--primary)">PRO</span></h1>
            <div id="user-status" style="margin: 20px 0; color: #888;">جاري فحص المصادقة...</div>
            <button id="pay-btn" class="entry-btn" style="background:var(--gold); color:#000;" onclick="chatoo.piPay()">تفعيل الوصول (1 Pi)</button>
            <button id="entry-btn" class="entry-btn" onclick="chatoo.unlockApp()">دخول التطبيق</button>
        </div>
    </div>

    <div class="app-shell" id="main-app">
        <header>
            <div style="color:var(--gold); font-weight:bold;">0.00 ✨</div>
            <div style="font-weight:900; letter-spacing:4px;">CHATOO</div>
            <div class="status-dot"></div>
        </header>
        <div id="map-canvas"></div>
        <nav>
            <div class="nav-item" onclick="location.reload()">👤</div>
            <div class="nav-item">🎁</div>
            <div class="nav-item active">📍</div>
        </nav>
    </div>

    <div id="modal-chat" class="view-modal">
        <div class="chat-header">
            <div onclick="chatoo.closeChat()" style="font-size:25px; cursor:pointer;">✕</div>
            <span id="venue-name">المكان</span>
            <div style="width:25px;"></div>
        </div>
        <div class="chat-stream" id="chat-flow"></div>
        <div style="padding:15px; background:#121214; display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="اكتب رسالة..." style="flex-grow:1; background:#1a1a1d; border:none; padding:15px; border-radius:25px; color:#fff; outline:none;">
            <button onclick="chatoo.sendMsg()" style="background:var(--gold); border:none; width:50px; height:50px; border-radius:50%; cursor:pointer;">➔</button>
        </div>
    </div>
<script>
    const chatoo = {
        state: { 
            id: 'User_' + Math.floor(Math.random()*999),
            room: null 
        },

        async init() {
            this.initFirebase();
            
            // إظهار واجهة الدخول فوراً لتجنب تعليق Pi Browser
            document.getElementById('entry-btn').style.display = 'block';

            try {
                // تهيئة Pi SDK
                await Pi.init({ version: "2.0", sandbox: false });
                const user = await Pi.authenticate(['username'], (p) => {});
                this.state.id = user.username;
                document.getElementById('user-status').innerHTML = `متصل كـ: <span style="color:var(--gold)">${user.username}</span>`;
            } catch (e) {
                console.log("العمل في وضع الزائر داخل Pi Browser");
            }
        },

        initFirebase() {
            // استخدام الإعدادات الخاصة بك مع إضافة خيار تجربة الاتصال المستمر
            const config = {
                apiKey: "AIzaSyD9L74WN6V_4lOrIoaQPPtyi_SO-LLtayA",
                authDomain: "chatoo-4566f.firebaseapp.com",
                projectId: "chatoo-4566f",
                appId: "1:724118831864:web:2cca10fa8d290d4288f10d"
            };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(config);
                // تفعيل التخزين المحلي لضمان عمل الرسائل حتى مع ضعف الشبكة في Pi Browser
                firebase.firestore().enablePersistence().catch(() => {});
            }
            window.db = firebase.firestore();
        },

        unlockApp() {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            this.setupMap();
        },

        setupMap() {
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                const map = L.map('map-canvas', { zoomControl: false, attributionControl: false }).setView([latitude, longitude], 16);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                const query = `[out:json];node["amenity"~"cafe|restaurant"](around:2000,${latitude},${longitude});out;`;
                fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                    .then(r => r.json()).then(data => {
                        data.elements.forEach(p => {
                            if(p.tags.name) L.marker([p.lat, p.lon]).addTo(map).on('click', () => this.openChat(p.tags.name));
                        });
                    });
            }, () => alert("يرجى تفعيل الموقع في Pi Browser"));
        },

        openChat(name) {
            this.state.room = name.replace(/\s+/g, '_');
            document.getElementById('venue-name').innerText = name;
            document.getElementById('modal-chat').classList.add('active');
            this.listen();
        },

        listen() {
            // الاستماع للرسائل بتوافق عالي مع Pi Browser
            db.collection("messages").doc(this.state.room).collection("chats")
                .orderBy("t", "asc")
                .onSnapshot((snap) => {
                    const flow = document.getElementById('chat-flow');
                    flow.innerHTML = "";
                    snap.forEach(doc => {
                        const m = doc.data();
                        const div = document.createElement('div');
                        div.className = `msg ${m.u === this.state.id ? 'me' : ''}`;
                        div.innerText = m.val;
                        flow.appendChild(div);
                    });
                    flow.scrollTop = flow.scrollHeight;
                }, (error) => {
                    console.error("Firebase Error in Pi:", error);
                });
        },

        async sendMsg() {
    const input = document.getElementById('chat-input');
    const val = input.value.trim();
    
    // التأكد من وجود اسم مستخدم، وإذا كان undefined نستخدم "Guest" مؤقتاً
    const senderId = (this.state.id && this.state.id !== 'undefined') ? this.state.id : 'Pi_User_' + Math.floor(Math.random()*999);

    if(!val || !this.state.room) return;

    try {
        await db.collection("messages").doc(this.state.room).collection("chats").add({
            u: senderId, // استخدام المعرف البديل هنا يمنع الخطأ الظاهر في صورتك
            val: val,
            t: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
        console.log("تم الإرسال بنجاح داخل باي براوزر!");
    } catch (e) {
        console.error("خطأ تقني في Firebase:", e);
        alert("تنبيه: تأكد من تفعيل الإنترنت داخل باي براوزر.");
    }
}

        },

        closeChat() { document.getElementById('modal-chat').classList.remove('active'); }
    };
    window.onload = () => chatoo.init();
</script>

</body>
</html>
