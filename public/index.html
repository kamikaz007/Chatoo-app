<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chatoo Ultra Pro | المرحلة النهائية</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="rpc.js"></script>

    <style>
        :root {
            --primary: #8257e5; --gold: #ffd700; --dark: #09090b;
            --glass: rgba(255, 255, 255, 0.05); --rpc-online: #00ff88;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* واجهة القفل السينمائية */
        #lock-screen {
            position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at center, #1a1a2e 0%, #09090b 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .card { background: var(--glass); padding: 40px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); width: 90%; max-width: 380px; }

        /* التطبيق الرئيسي */
        .app-shell { display: none; flex-direction: column; height: 100vh; position: relative; }
        #map-canvas { flex-grow: 1; z-index: 10; width: 100%; height: 100%; filter: grayscale(0.5) brightness(0.6); }

        header { position: absolute; top: 0; width: 100%; padding: 25px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .rpc-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .rpc-active { background: var(--rpc-online); box-shadow: 0 0 15px var(--rpc-online); }

        /* نافذة الدردشة */
        .view-modal { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: none; flex-direction: column; }
        .view-modal.active { display: flex; }
        .chat-stream { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--primary); }
        .msg.them { align-self: flex-start; background: #222; }

        nav { background: #050505; display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid var(--glass); z-index: 2000; }
        .btn-pay { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="card">
            <h1 style="letter-spacing: 4px;">CHATOO <span style="color:var(--primary)">PRO</span></h1>
            <div id="user-status" style="margin: 20px 0; color: #888; font-size: 14px;">جاري المصادقة...</div>
            <button id="pay-btn" class="btn-pay" onclick="chatoo.piPay(1.0, 'تفعيل Pro')">تفعيل الوصول (1 Pi)</button>
        </div>
    </div>

    <div class="app-shell" id="main-app">
        <header>
            <div id="rpc-dot" class="rpc-dot"></div>
            <div style="font-weight:900; letter-spacing:4px;">CHATOO</div>
            <div style="color:var(--gold)">✨ <span id="xp-display">0</span></div>
        </header>
        <div id="map-canvas"></div>
        <nav>
            <div style="font-size:24px;">📍</div>
            <div style="font-size:24px; opacity:0.3;">🎁</div>
            <div style="font-size:24px; opacity:0.3;">👤</div>
        </nav>
    </div>

    <div id="modal-chat" class="view-modal">
        <div style="background:var(--primary); padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <div onclick="chatoo.closeChat()" style="font-size:22px; cursor:pointer;">✕</div>
            <b id="venue-title">المكان</b>
            <div style="width:22px;"></div>
        </div>
        <div class="chat-stream" id="chat-flow"></div>
        <div style="padding:15px; background:#0c0c0e; display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="اكتب رسالة..." style="flex-grow:1; background:#1a1a1d; border:none; padding:15px; border-radius:25px; color:#fff;">
            <button onclick="chatoo.sendMsg()" style="background:var(--gold); border:none; width:50px; height:50px; border-radius:50%;">➔</button>
        </div>
    </div>

    <script>
        const chatoo = {
            state: { id: null, xp: parseInt(localStorage.getItem('chatoo_xp')) || 0, isVerified: localStorage.getItem('chatoo_verified') === 'true' },

            async init() {
                this.initFirebase();
                if (window.RPC) await window.RPC.checkStatus();
                await this.initPi();
            },

            initFirebase() {
                const config = {
                    apiKey: "AIzaSyD9L74WN6V_4lOrIoaQPPtyi_SO-LLtayA",
                    authDomain: "chatoo-4566f.firebaseapp.com",
                    projectId: "chatoo-4566f",
                    appId: "1:724118831864:web:2cca10fa8d290d4288f10d"
                };
                if (!firebase.apps.length) firebase.initializeApp(config);
                window.db = firebase.firestore();
            },

            async initPi() {
                try {
                    await Pi.init({ version: "2.0", sandbox: true });
                    const user = await Pi.authenticate(['username', 'payments'], (p) => {});
                    
                    if (user && user.username) {
                        this.state.id = user.username;
                        document.getElementById('user-status').innerHTML = `مرحباً <span style="color:var(--gold)">${user.username}</span>`;
                        
                        // دخول تلقائي إذا كان مفعل سابقاً
                        if (this.state.isVerified) {
                            this.unlockApp();
                        } else {
                            document.getElementById('pay-btn').style.display = 'block';
                        }
                    }
                } catch (e) {
                    document.getElementById('user-status').innerText = "افتح التطبيق من Pi Browser";
                }
            },

            async piPay(amt, label) {
                try {
                    await Pi.createPayment({ amount: amt, memo: label, metadata: {uid: this.state.id} }, {
                        onReadyForServerApproval: (pId) => fetch('/.netlify/functions/payment', { method: 'POST', body: JSON.stringify({ paymentId: pId, action: 'approve' }) }),
                        onReadyForServerCompletion: (pId, txid) => {
                            this.state.isVerified = true;
                            localStorage.setItem('chatoo_verified', 'true');
                            this.unlockApp();
                        }
                    });
                } catch (e) { Swal.fire("تنبيه", "تأكد من رصيدك في Testnet", "warning"); }
            },

            unlockApp() {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('xp-display').innerText = this.state.xp;
                this.setupMap();
            },

            setupMap() {
                navigator.geolocation.getCurrentPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    const map = L.map('map-canvas', { zoomControl: false, attributionControl: false }).setView([latitude, longitude], 16);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                    
                    const query = `[out:json];node["amenity"~"cafe|restaurant"](around:1500,${latitude},${longitude});out;`;
                    fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                        .then(r => r.json()).then(data => {
                            data.elements.forEach(p => {
                                if(p.tags.name) L.marker([p.lat, p.lon]).addTo(map).on('click', () => this.openChat(p.tags.name));
                            });
                        });
                });
            },

            openChat(name) {
                this.state.room = name.replace(/\s+/g, '_');
                document.getElementById('venue-title').innerText = name;
                document.getElementById('modal-chat').classList.add('active');
                this.listen();
            },

            listen() {
                db.collection("rooms_v2").doc(this.state.room).collection("m").orderBy("t", "asc").limitToLast(30)
                    .onSnapshot(snap => {
                        const flow = document.getElementById('chat-flow');
                        flow.innerHTML = "";
                        snap.forEach(doc => {
                            const m = doc.data();
                            const div = document.createElement('div');
                            div.className = `msg ${m.u === this.state.id ? 'me' : 'them'}`;
                            div.innerText = m.val;
                            flow.appendChild(div);
                        });
                        flow.scrollTop = flow.scrollHeight;
                    });
            },

            async sendMsg() {
                const input = document.getElementById('chat-input');
                if(!input.value.trim()) return;
                await db.collection("rooms_v2").doc(this.state.room).collection("m").add({
                    u: this.state.id, val: input.value, t: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
                this.state.xp += 5;
                localStorage.setItem('chatoo_xp', this.state.xp);
                document.getElementById('xp-display').innerText = this.state.xp;
            },

            closeChat() { document.getElementById('modal-chat').classList.remove('active'); }
        };
        window.onload = () => chatoo.init();
    </script>
</body>
</html>
