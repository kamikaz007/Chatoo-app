<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatoo Pro - Web3</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #8a2be2;
            --gold: #ffb800;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #09090b 100%);
            padding: 20px;
            overflow: hidden;
        }
        .card {
            background: var(--glass);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .status-badge {
            font-size: 11px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }
        h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        .btn-pay {
            background: linear-gradient(45deg, var(--primary), #4b55f7);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
        }
        .btn-pay:active { transform: scale(0.96); }
        #user-status { margin-top: 15px; font-size: 14px; color: #ccc; }
        .sp-bar { width: 100%; height: 4px; background: #111; position: fixed; top: 0; left: 0; z-index: 1000; }
        #sp { width: 0%; height: 100%; background: var(--gold); transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div class="sp-bar"><div id="sp"></div></div>
    
    <div class="card">
        <span class="status-badge">Web3 Secure Gateway</span>
        <h1>CHATOO <span style="color: var(--primary);">PRO</span></h1>
        <p style="color: #888; font-size: 14px; line-height: 1.6;">قم بتفعيل حسابك عبر شبكة Pi للوصول إلى الخريطة التفاعلية وغرف الدردشة.</p>
        
        <div id="user-status">جاري الاتصال بـ Pi...</div>

        <button class="btn-pay" onclick="transferPi()">تفعيل الحساب (1 Pi)</button>
    </div>

    <script>
        const Pi = window.Pi;

        async function initApp() {
            try {
                // تفعيل Sandbox لتجربة الدفع على Testnet
                await Pi.init({ version: "2.0", sandbox: true });
                
                const scopes = ['username', 'payments'];
                const onIncompletePaymentFound = (payment) => { 
                    console.log("Incomplete payment found", payment);
                };

                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById('user-status').innerText = `مرحباً، ${user.username}`;
                document.getElementById('sp').style.width = '100%';
            } catch (err) {
                document.getElementById('user-status').innerHTML = '<span style="color:#ff4b4b;">يجب فتح التطبيق داخل Pi Browser</span>';
            }
        }

        async function transferPi() {
            const paymentData = {
                amount: 1.0,
                memo: "تفعيل حساب Chatoo Pro - Netlify",
                metadata: { type: "activation" }
            };

            const callbacks = {
                onReadyForServerApproval: async (paymentId) => {
                    // الربط مع دالة Netlify
                    return await fetch('/.netlify/functions/payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, action: 'approve' })
                    });
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    await fetch('/.netlify/functions/payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid, action: 'complete' })
                    });
                    
                    Swal.fire({
                        title: 'تم التفعيل!',
                        text: 'مرحباً بك في Chatoo Pro',
                        icon: 'success',
                        background: '#1a1a2e',
                        color: '#fff',
                        confirmButtonColor: '#8a2be2'
                    });
                },
                onCancel: (paymentId) => console.log("User cancelled"),
                onError: (error, payment) => Swal.fire('خطأ', 'فشلت عملية الدفع', 'error')
            };

            try {
                await Pi.createPayment(paymentData, callbacks);
            } catch (err) {
                console.error("Payment Error:", err);
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
